<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>havi — CSS keyframes</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden;
        background: radial-gradient(circle at 50% 40%, #1b2735, #090a0f); }
      .stage { position: absolute; inset: 0; display: grid; place-items: center; }
      .orbit { position: relative; width: 40vmin; height: 40vmin; animation: spin 6s linear infinite; }
      .dot { position: absolute; top: 50%; left: 50%; width: 4vmin; height: 4vmin;
        margin: -2vmin; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
      .dot:nth-child(1) { transform: rotate(0deg)   translateX(18vmin); background: #ff5f6d; }
      .dot:nth-child(2) { transform: rotate(60deg)  translateX(18vmin); background: #ffc371; animation-delay: .25s; }
      .dot:nth-child(3) { transform: rotate(120deg) translateX(18vmin); background: #47e891; animation-delay: .5s; }
      .dot:nth-child(4) { transform: rotate(180deg) translateX(18vmin); background: #2bd2ff; animation-delay: .75s; }
      .dot:nth-child(5) { transform: rotate(240deg) translateX(18vmin); background: #8a7bff; animation-delay: 1s; }
      .dot:nth-child(6) { transform: rotate(300deg) translateX(18vmin); background: #ff7bd5; animation-delay: 1.25s; }
      .core { position: absolute; width: 8vmin; height: 8vmin; border-radius: 50%;
        background: #fff; filter: blur(2px); animation: breathe 3s ease-in-out infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { transform: rotate(var(--r)) translateX(18vmin) scale(1); }
        50% { transform: rotate(var(--r)) translateX(22vmin) scale(1.4); } }
      @keyframes breathe { 0%,100% { transform: scale(1); opacity: .9; } 50% { transform: scale(1.5); opacity: 1; } }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="orbit">
        <div class="core"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </body>
</html>
