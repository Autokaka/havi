<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>havi — SVG spinner</title>
    <style>
      * { margin: 0; } html, body { width: 100%; height: 100%; overflow: hidden;
        background: #0e1116; display: grid; place-items: center; }
      svg { width: 60vmin; height: 60vmin; }
      .ring { fill: none; stroke-linecap: round; transform-origin: 50% 50%; }
      .r1 { stroke: #2bd2ff; stroke-width: 4; stroke-dasharray: 180 320; animation: spin 3s linear infinite; }
      .r2 { stroke: #47e891; stroke-width: 4; stroke-dasharray: 120 240; animation: spin 2s linear infinite reverse; }
      .r3 { stroke: #ff5f6d; stroke-width: 4; stroke-dasharray: 60 200; animation: spin 1.5s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes dash { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 500; } }
      .dash { animation: dash 4s linear infinite, spin 8s linear infinite; }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 200 200">
      <circle class="ring r1 dash" cx="100" cy="100" r="86" />
      <circle class="ring r2" cx="100" cy="100" r="64" />
      <circle class="ring r3" cx="100" cy="100" r="42" />
      <circle cx="100" cy="100" r="10" fill="#fff">
        <animate attributeName="r" values="8;16;8" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;.5;1" dur="2s" repeatCount="indefinite" />
      </circle>
    </svg>
  </body>
</html>
