<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>havi — typing</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0f14;
        font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .term { position: absolute; inset: 6vmin; border-radius: 1.5vmin; background: #11161d;
        box-shadow: 0 4vmin 8vmin rgba(0,0,0,.5); padding: 5vmin 4vmin; color: #cde;
        font-size: 3.4vmin; line-height: 1.6; }
      .bar { position: absolute; top: 0; left: 0; right: 0; height: 4vmin;
        background: #1b232d; border-radius: 1.5vmin 1.5vmin 0 0; display: flex; align-items: center; gap: 1vmin; padding: 0 2vmin; }
      .bar i { width: 1.6vmin; height: 1.6vmin; border-radius: 50%; display: inline-block; }
      .p { color: #47e891; } .out { color: #9fb3c8; }
      .cursor { display: inline-block; width: 1.4vmin; height: 3vmin; background: #2bd2ff;
        vertical-align: -0.4vmin; animation: blink 1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <div class="term">
      <div class="bar"><i style="background:#ff5f56"></i><i style="background:#ffbd2e"></i><i style="background:#27c93f"></i></div>
      <div style="margin-top:3vmin"><span class="p">$</span> <span id="t" class="out"></span><span class="cursor"></span></div>
    </div>
    <script>
      const line = "npx @autokaka/havi page.html -o demo.mp4";
      const el = document.getElementById("t");
      let shown = 0;
      function frame(t) {
        const n = Math.min(line.length, Math.floor(t / 90));
        if (n !== shown) { shown = n; el.textContent = line.slice(0, n); }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    </script>
  </body>
</html>
